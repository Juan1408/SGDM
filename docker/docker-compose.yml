# docker-compose: orquesta los contenedores necesarios para la app SGDM
# - servicio web (PHP/Apache)
# - servicio de base de datos (MySQL)

version: '3.8'
services:
  web:
    build: ./docker
    ports:
      - "8080:80"
    volumes:
      - ./codigo_fuente:/var/www/html
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: sgdm
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
